<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folio</title>
  <meta name="description" content="Folio — 당신의 캐릭터와 대화하세요." />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="Folio" />
  <meta property="og:description" content="Folio — 당신의 캐릭터와 대화하세요." />
  <meta property="og:image"       content="https://character-ai-prototype-production.up.railway.app/images/seo_image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Folio" />
  <meta name="twitter:description" content="Folio — 당신의 캐릭터와 대화하세요." />
  <meta name="twitter:image"       content="https://character-ai-prototype-production.up.railway.app/images/seo_image.png" />

  <link rel="icon" href="/images/logo.png" type="image/png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div id="app">

  <!-- ── SCREEN 1: Landing (Character Select) ───────────── -->
  <div id="screen-landing" class="screen active">
    <div class="page-wrap">
      <div class="landing-header">
        <div class="landing-header-left">
          <span class="landing-logo">Foli<span class="logo-o-wrap"><span class="logo-dots"><span class="logo-dot logo-dot-1"></span><span class="logo-dot logo-dot-2"></span></span>o</span></span>
          <span class="landing-subtitle">대화 상대를 선택하세요</span>
        </div>
        <div class="landing-header-right">
          <button class="btn-icon" onclick="showToast('준비 중인 기능입니다')">🔍</button>
          <button class="btn-icon" onclick="showToast('준비 중인 기능입니다')">☰</button>
        </div>
      </div>
      <div class="page-body" style="padding-top:20px;">
        <p class="section-label">추천 캐릭터</p>
        <div id="char-grid" class="char-grid">
          <p style="font-size:13px;color:var(--text-dim);">불러오는 중...</p>
        </div>
      </div>
      <div class="landing-footer">
        <button id="btn-continue" class="btn-ghost" onclick="showScreen('screen-history')" style="display:none;">이전 대화 불러오기</button>
      </div>
    </div>
  </div>

  <!-- ── SCREEN 5: History ─────────────────────────────────── -->
  <div id="screen-history" class="screen">
    <div class="page-wrap">
      <div class="page-nav">
        <button class="btn-back" onclick="showScreen('screen-landing')">←</button>
        <span class="nav-label">Previous Conversations</span>
      </div>
      <div class="page-body">
        <p class="page-title">이전 대화</p>
        <div id="session-list" style="display:flex;flex-direction:column;gap:10px;margin-top:4px;"></div>
      </div>
    </div>
  </div>

  <!-- ── SCREEN 2: Character Intro (dynamic) ────────────── -->
  <div id="screen-intro" class="screen">
    <div class="page-wrap">
      <div class="page-nav">
        <button class="btn-back" onclick="showScreen('screen-landing')">←</button>
        <span class="nav-label">Character Profile</span>
      </div>
      <div class="page-body">
        <div class="intro-img-wrap">
          <img id="intro-img" src="" alt="" class="intro-img" />
        </div>
        <div>
          <p class="page-title" id="intro-fullname"></p>
          <p id="intro-subtitle" style="font-size:13px;color:var(--text-dim);margin-top:2px;"></p>
        </div>
        <div class="profile-card" id="intro-profile-card"></div>
        <div class="note-card" id="intro-note-card"></div>
        <button class="btn-primary" onclick="showScreen('screen-persona')">페르소나 설정하기</button>
      </div>
    </div>
  </div>

  <!-- ── SCREEN 3: Persona Setup ────────────────────────── -->
  <div id="screen-persona" class="screen">
    <div class="page-wrap">
      <div class="page-nav">
        <button class="btn-back" onclick="showScreen('screen-intro')">←</button>
        <span class="nav-label">Persona Setup</span>
      </div>
      <div class="page-body">
        <div>
          <p class="page-title">당신은 누구인가요?</p>
          <p style="font-size:13px;color:var(--text-dim);margin-top:4px;" id="persona-subtitle">캐릭터가 당신을 알 수 있도록 정보를 입력해주세요.</p>
        </div>

        <button class="recommend-btn" onclick="fillRecommended()">
          ✦ 추천 페르소나 채우기
        </button>

        <form id="persona-form" onsubmit="startChat(event)" style="display:flex;flex-direction:column;gap:14px;">
          <div class="form-group">
            <label>프로필 이미지</label>
            <div class="upload-avatar-wrap">
              <div class="upload-avatar" id="upload-avatar" onclick="document.getElementById('user-img-input').click()">
                <span class="upload-avatar-plus" id="upload-avatar-plus">+</span>
                <img id="upload-avatar-preview" class="upload-avatar-img" style="display:none;" alt="프로필" />
              </div>
              <input type="file" id="user-img-input" accept="image/*" style="display:none;" onchange="handleUserImageUpload(event)" />
              <div>
                <p class="upload-avatar-hint">1장 업로드 가능<br>채팅 모드에서만 표시됩니다.</p>
                <button type="button" class="upload-remove" id="upload-remove" onclick="removeUserImage()">이미지 제거</button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>이름 <span class="required">*</span></label>
            <input type="text" id="p-name" placeholder="{{user}}" required oninput="syncUserPlaceholders(this.value)" />
          </div>
          <div class="form-group">
            <label>나이 <span class="required">*</span></label>
            <input type="number" id="p-age" placeholder="29" min="1" max="99" required />
          </div>
          <div class="form-group">
            <label>외형</label>
            <input type="text" id="p-appearance" placeholder="키가 크고 무표정한 인상" />
          </div>
          <div class="form-group">
            <label>성격</label>
            <textarea id="p-personality" rows="2" placeholder="무뚝뚝하고 말이 없는 편"></textarea>
          </div>
          <div class="form-group">
            <label>특이사항</label>
            <textarea id="p-notes" rows="2" placeholder="이화의 남자친구. 같은 팀 프로파일러."></textarea>
          </div>
          <button type="submit" class="btn-primary" style="margin-top:4px;">대화 시작</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── SCREEN 4: Chat ──────────────────────────────────── -->
  <div id="screen-chat" class="screen">
    <div class="chat-header">
      <button class="btn-back" onclick="resetChat()">←</button>
      <img id="chat-header-avatar" src="/images/ihwa.png" alt="" class="chat-avatar" />
      <div class="chat-header-info">
        <span class="chat-name" id="chat-header-name">이화</span>
        <span class="chat-status" id="chat-header-status">S.A. Team Nocturne · Profiler</span>
      </div>
      <button class="btn-mode-toggle" id="btn-mode-toggle" onclick="toggleMode()">📖 소설</button>
      <button class="btn-note" id="btn-note" onclick="openNote()" title="유저 노트">
        📝<span class="note-dot" id="note-dot" style="display:none;"></span>
      </button>
    </div>

  <!-- Note Modal -->
  <div id="note-overlay" class="note-overlay" onclick="closeNote(event)">
    <div class="note-panel">
      <div class="note-panel-header">
        <span class="note-panel-title">유저 노트</span>
        <button class="note-close" onclick="closeNotePanel()">✕</button>
      </div>
      <p class="note-panel-desc">캐릭터가 대화 중 참고할 사실이나 맥락을 입력하세요. 매 응답에 자동 반영됩니다.</p>
      <textarea
        id="note-textarea"
        class="note-textarea"
        placeholder="예: 오늘 강현의 생일이다. 이화는 미리 선물을 준비해뒀다."
        maxlength="1000"
        oninput="updateNoteCount()"
      ></textarea>
      <div class="note-footer">
        <span id="note-count" class="note-count">0 / 1000</span>
        <button class="btn-primary note-save-btn" onclick="saveNote()">저장</button>
      </div>
    </div>
  </div>

    <div id="chat-messages" class="chat-messages"></div>

    <div class="model-bar">
      <button class="btn-model" id="btn-model" onclick="toggleModelPicker()">
        <span id="model-label">Sonnet 4.6</span>
        <span class="model-caret">⌃</span>
      </button>
    </div>

    <div class="chat-input-wrap">
      <textarea
        id="chat-input"
        class="chat-input"
        placeholder="메시지를 입력하세요"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="btn-send" id="btn-send" onclick="sendMessage()">↑</button>
    </div>
  </div>

</div><!-- /#app -->

<!-- Bottom navigation (landing only) -->
<nav id="bottom-nav" class="bottom-nav">
  <button class="nav-tab active" data-label="캐릭터">
    <span class="nav-tab-icon">⊞</span>
    <span class="nav-tab-label">캐릭터</span>
  </button>
  <button class="nav-tab" data-label="탐색" onclick="showToast('준비 중인 기능입니다')">
    <span class="nav-tab-icon">◎</span>
    <span class="nav-tab-label">탐색</span>
  </button>
  <button class="nav-tab" data-label="페르소나" onclick="showToast('준비 중인 기능입니다')">
    <span class="nav-tab-icon">◈</span>
    <span class="nav-tab-label">페르소나</span>
  </button>
  <button class="nav-tab" data-label="마이페이지" onclick="showToast('준비 중인 기능입니다')">
    <span class="nav-tab-icon">◉</span>
    <span class="nav-tab-label">마이페이지</span>
  </button>
</nav>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Model picker — outside #app to escape overflow:hidden -->
<div id="model-picker" class="model-picker"></div>
<script src="/js/app.js"></script>
</body>
</html>
